// ── Build DOM ────────────────────────────────────────────────────────────────
const quizEl = document.getElementById('quiz');
let currentSection = '';
let answered = new Array(questions.length).fill(false);

questions.forEach((q, qi) => {
  if (q.section !== currentSection) {
    currentSection = q.section;
    const sec = document.createElement('div');
    sec.className = 'section-label';
    sec.textContent = q.section;
    quizEl.appendChild(sec);
  }

  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `q${qi}`;

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.innerHTML = `<span class="q-number">Q${qi + 1}.</span>${q.q}`;
  card.appendChild(qText);

  const opts = document.createElement('div');
  opts.className = 'options';

  const letters = ['A','B','C','D'];
  q.opts.forEach((o, oi) => {
    const opt = document.createElement('div');
    opt.className = 'option';
    opt.id = `q${qi}o${oi}`;
    opt.innerHTML = `<span class="letter">${letters[oi]}</span><span>${o}</span>`;
    opt.onclick = () => selectOption(qi, oi);
    opts.appendChild(opt);
  });

  card.appendChild(opts);

  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.id = `fb${qi}`;
  card.appendChild(fb);

  quizEl.appendChild(card);
});

// ── Interaction ──────────────────────────────────────────────────────────────
function selectOption(qi, oi) {
  if (answered[qi]) return;

  const q = questions[qi];
  const card = document.getElementById(`q${qi}`);

  // Lock all options
  for (let i = 0; i < q.opts.length; i++) {
    const el = document.getElementById(`q${qi}o${i}`);
    el.classList.add('locked');
    if (i === oi) el.classList.add('selected');
  }

  const fb = document.getElementById(`fb${qi}`);

  if (oi === q.ans) {
    document.getElementById(`q${qi}o${oi}`).classList.add('correct');
    card.classList.add('correct');
    fb.textContent = '✓ Correct! ' + q.exp;
    fb.className = 'feedback show ok';
  } else {
    document.getElementById(`q${qi}o${oi}`).classList.add('wrong');
    document.getElementById(`q${qi}o${q.ans}`).classList.add('reveal');
    card.classList.add('wrong');
    fb.textContent = '✗ Incorrect. ' + q.exp;
    fb.className = 'feedback show no';
  }

  answered[qi] = (oi === q.ans) ? 'correct' : 'wrong';
}

// ── Submit ────────────────────────────────────────────────────────────────────
function submitAll() {
  let correct = 0;
  const total = questions.length;

  answered.forEach((a, qi) => {
    const q = questions[qi];
    const card = document.getElementById(`q${qi}`);
    const fb = document.getElementById(`fb${qi}`);

    if (!a) {
      // Reveal answer for unanswered
      for (let i = 0; i < q.opts.length; i++) {
        document.getElementById(`q${qi}o${i}`).classList.add('locked');
      }
      document.getElementById(`q${qi}o${q.ans}`).classList.add('reveal');
      fb.textContent = 'Not answered. ' + q.exp;
      fb.className = 'feedback show no';
      card.classList.add('wrong');
    }
    if (a === 'correct') correct++;
  });

  const pct = Math.round((correct / total) * 100);
  const scoreBox = document.getElementById('scoreBox');
  scoreBox.style.display = 'block';
  document.getElementById('scoreNum').textContent = `${correct} / ${total}`;
  document.getElementById('scoreSub').textContent = `${pct}% – ${grade(pct)}`;
  document.getElementById('progressFill').style.width = pct + '%';
  scoreBox.scrollIntoView({ behavior: 'smooth' });
}

function grade(pct) {
  if (pct >= 90) return 'Excellent – you have mastered the material!';
  if (pct >= 75) return 'Good work – review any missed questions.';
  if (pct >= 60) return 'Decent effort – revisit the slides for weak areas.';
  if (pct >= 40) return 'Keep going – more revision needed.';
  return 'Please review the lecture slides thoroughly.';
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetAll() {
  answered = new Array(questions.length).fill(false);
  questions.forEach((q, qi) => {
    const card = document.getElementById(`q${qi}`);
    card.className = 'q-card';
    const fb = document.getElementById(`fb${qi}`);
    fb.className = 'feedback';
    for (let i = 0; i < q.opts.length; i++) {
      const el = document.getElementById(`q${qi}o${i}`);
      el.className = 'option';
    }
  });
  document.getElementById('scoreBox').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
